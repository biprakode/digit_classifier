services:
  - type: web
    name: digit-classifier
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: NODE_VERSION
        value: "22"
      - key: CORS_ORIGINS
        value: "*"